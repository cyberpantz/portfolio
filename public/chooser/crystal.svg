<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <clipPath id="cball">
      <circle cx="200" cy="205" r="148"/>
    </clipPath>
    <!-- diamond / crystal facet tiles — same language as disco ball, different shape -->
    <pattern id="ctiles" x="0" y="0" width="30" height="25" patternUnits="userSpaceOnUse">
      <rect width="30" height="25" fill="#111"/>
      <polygon points="15,1 28,12 15,23 2,12" fill="#484858" stroke="#1a1a28" stroke-width="1"/>
    </pattern>
    <radialGradient id="cglow" cx="36%" cy="28%" r="72%">
      <stop offset="0%" stop-color="white" stop-opacity="0.07"/>
      <stop offset="48%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.50"/>
    </radialGradient>
  </defs>

  <!-- STAND (drawn first so ball sits on top) -->
  <ellipse cx="200" cy="354" rx="40" ry="8"  fill="#111" stroke="white" stroke-width="1.5"/>
  <line x1="160" y1="356" x2="150" y2="373" stroke="white" stroke-width="1.5"/>
  <line x1="240" y1="356" x2="250" y2="373" stroke="white" stroke-width="1.5"/>
  <ellipse cx="200" cy="373" rx="52" ry="10" fill="#111" stroke="white" stroke-width="1.5"/>

  <!-- BALL: body + diamond tile grid + sphere shading -->
  <circle cx="200" cy="205" r="148" fill="#111"/>
  <rect x="20" y="30" width="360" height="360" fill="url(#ctiles)" clip-path="url(#cball)"/>
  <circle cx="200" cy="205" r="148" fill="url(#cglow)"/>

  <!-- glare highlight (same construction as disco ball) -->
  <ellipse cx="151" cy="150" rx="27" ry="16" fill="white" opacity="0.33"
           transform="rotate(-28 151 150)" clip-path="url(#cball)"/>
  <ellipse cx="146" cy="145" rx="10" ry="6"  fill="white" opacity="0.62"
           transform="rotate(-28 146 145)" clip-path="url(#cball)"/>

  <!-- BALL OUTLINE on top of stand -->
  <circle cx="200" cy="205" r="148" stroke="white" stroke-width="3"/>

  <!-- SPARKLES -->
  <!-- top-left, large -->
  <g transform="translate(40 92)">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- right, medium -->
  <g transform="translate(372 192)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- bottom-right, medium -->
  <g transform="translate(336 354)">
    <line x1="0" y1="-13" x2="0" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- top-right, small -->
  <g transform="translate(357 74)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- bottom-left, tiny -->
  <g transform="translate(66 353)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="white" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
